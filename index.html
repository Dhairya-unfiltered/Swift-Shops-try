<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f857a6">
<meta name="description" content="Swift Shops">
<title>Swift Shops</title>

 <link rel="icon" type="image/png" href="./public/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --pink:#f857a6;
  --pink2:#ff6db5;
  --pink3:#d81b72;
  --white:#ffffff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
}

body{
  font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  color:#fff;
  background:
    radial-gradient(circle at top center, rgba(255,255,255,.04), transparent 22%),
    linear-gradient(145deg,var(--pink),var(--pink3),var(--pink2));
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}

/* App */
#app{
  width:100%;
  height:100%;
  position:relative;
}

/* Slides */
.slide{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:28px;
  overflow:hidden;

  background:
    radial-gradient(circle at top center, rgba(255,255,255,.04), transparent 22%),
    linear-gradient(145deg,var(--pink),var(--pink3),var(--pink2));

  opacity:0;
  transform:translateY(26px) scale(.995);
  transition:
    opacity .42s ease,
    transform .42s ease;
  pointer-events:none;

  will-change:transform,opacity;
}

.slide.active{
  opacity:1;
  transform:translateY(0) scale(1);
  pointer-events:auto;
}

.watermark{
  position:absolute;
  width:min(52vw,520px);
  opacity:.028;
  z-index:1;
}

.copy{
  position:relative;
  z-index:5;
  width:min(100%,1100px);
  padding-inline:8px;
}

h1{
  font-size:clamp(2.3rem,6vw,6rem);
  line-height:1.06;
  letter-spacing:-0.055em;
  font-weight:900;
  max-width:980px;
  margin:auto;
  text-shadow:0 8px 18px rgba(0,0,0,.16);
  text-wrap:balance;
}

/* Side Dots */
.dots{
  position:fixed;
  right:18px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:12px;
  z-index:100;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:rgba(255,255,255,.32);
  transition:.25s ease;
}

.dot.active{
  background:#fff;
  transform:scale(1.45);
}

/* Arrow */
.arrow{
  position:fixed;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);
  font-size:28px;
  opacity:.92;
  z-index:100;
  animation:bounce 1.6s infinite;
  user-select:none;
}

/* Glow */
.glow{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,.06);
  filter:blur(90px);
}

.g1{
  width:240px;
  height:240px;
  top:-40px;
  left:-30px;
}

.g2{
  width:220px;
  height:220px;
  right:-30px;
  bottom:-40px;
}

@keyframes bounce{
  0%,100%{
    transform:translateX(-50%) translateY(0);
  }
  50%{
    transform:translateX(-50%) translateY(8px);
  }
}

/* Tablet */
@media(max-width:1024px){
  h1{
    font-size:clamp(2.1rem,7vw,4.7rem);
    max-width:820px;
  }
}

/* Mobile */
@media(max-width:768px){

  .slide{
    padding:22px 18px;
  }

  .copy{
    width:100%;
    max-width:100%;
  }

  .watermark{
    width:78vw;
    opacity:.024;
  }

  h1{
    font-size:clamp(2rem,9vw,3.2rem);
    line-height:1.08;
    max-width:100%;
    letter-spacing:-0.045em;
  }

  .dots{
    right:12px;
  }
}

@media(max-width:430px){
  h1{
    font-size:clamp(1.95rem,8.6vw,2.8rem);
  }
}

@media(max-width:360px){
  h1{
    font-size:2rem;
  }
}
</style>
</head>
<body>

<!-- Inline SVG -->
<svg width="0" height="0" style="position:absolute">
<defs>
<symbol id="bag" viewBox="0 0 100 100">
  <path fill="#fff" d="M24 31h52c2.5 0 4.5 2 4.5 4.5l-3.8 44c-.3 3.6-2.8 5.5-6 5.5H29.3c-3.2 0-5.7-1.9-6-5.5l-3.8-44c0-2.5 2-4.5 4.5-4.5z"/>
  <path fill="#fff" d="M39 31v-7c0-9 5-14 11-14s11 5 11 14v7h-5v-7c0-5-2.5-8-6-8s-6 3-6 8v7z"/>
  <path fill="#f857a6" d="M56 46L43 61c-2 2 0 5 3 4l8-2-5 14c-1 2 2 4 4 2l13-17c2-2 0-5-3-4l-8 2 5-12c1-2-2-4-4-2z"/>
</symbol>
</defs>
</svg>

<div id="app">

<section class="slide active">
<svg class="watermark" viewBox="0 0 100 100"><use href="#bag"/></svg>
<div class="glow g1"></div>
<div class="glow g2"></div>
<div class="copy"><h1>We shut down our startup.</h1></div>
</section>

<section class="slide">
<svg class="watermark" viewBox="0 0 100 100"><use href="#bag"/></svg>
<div class="glow g1"></div>
<div class="glow g2"></div>
<div class="copy"><h1>The idea was unique,</h1></div>
</section>

<section class="slide">
<svg class="watermark" viewBox="0 0 100 100"><use href="#bag"/></svg>
<div class="glow g1"></div>
<div class="glow g2"></div>
<div class="copy"><h1>But, timing changed.</h1></div>
</section>

<section class="slide">
<svg class="watermark" viewBox="0 0 100 100"><use href="#bag"/></svg>
<div class="glow g1"></div>
<div class="glow g2"></div>
<div class="copy"><h1>Consumers are adopting quick commerce.</h1></div>
</section>

<section class="slide">
<svg class="watermark" viewBox="0 0 100 100"><use href="#bag"/></svg>
<div class="glow g1"></div>
<div class="glow g2"></div>
<div class="copy"><h1>We stepped back. We’ll return better.</h1></div>
</section>

</div>

<div class="dots">
<div class="dot active"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>

<div class="arrow">↓</div>

<script>
const slides = document.querySelectorAll('.slide');
const dots = document.querySelectorAll('.dot');

let current = 0;
let locked = false;

/* CHANGE PAGE */
function show(i){
  if(i < 0 || i >= slides.length || locked || i === current) return;

  locked = true;

  slides[current].classList.remove('active');
  dots[current].classList.remove('active');

  current = i;

  slides[current].classList.add('active');
  dots[current].classList.add('active');

  setTimeout(() => {
    locked = false;
  }, 430);
}

function next(){ show(current + 1); }
function prev(){ show(current - 1); }

/* KEYBOARD */
window.addEventListener('keydown', e => {
  if(e.key === "ArrowDown" || e.key === "PageDown"){
    e.preventDefault();
    next();
  }

  if(e.key === "ArrowUp" || e.key === "PageUp"){
    e.preventDefault();
    prev();
  }
}, { passive:false });

/* TRACKPAD / MOUSE */
window.addEventListener('wheel', e => {
  e.preventDefault();

  if(locked) return;

  if(Math.abs(e.deltaY) < 16) return;

  if(e.deltaY > 0) next();
  else prev();

}, { passive:false });

/* TOUCH */
let startY = 0;

window.addEventListener('touchstart', e => {
  startY = e.touches[0].clientY;
}, { passive:true });

window.addEventListener('touchend', e => {
  if(locked) return;

  const endY = e.changedTouches[0].clientY;
  const diff = startY - endY;

  if(Math.abs(diff) < 45) return;

  if(diff > 0) next();
  else prev();

}, { passive:true });
</script>

</body>
</html>
